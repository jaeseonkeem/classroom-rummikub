<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>실시간 분반 루미큐브 등록 규칙 적용</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; background: #2c3e50; color: white; padding: 10px; text-align: center; margin: 0;
            overflow-x: hidden; touch-action: manipulation;
        }
        h1 { font-size: 20px; margin: 5px 0; }
        .room-tag { background: #e74c3c; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
        .controls { margin: 10px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; }
        button {
            padding: 8px 14px; font-size: 14px; font-weight: bold; background: #e67e22; border: none; color: white; border-radius: 5px; cursor: pointer;
        }
        button:disabled { background: #7f8c8d !important; cursor: not-allowed; }
        button.blue-btn { background: #3498db; }
        button.green-btn { background: #2ecc71; }
        
        .player-status-board {
            background: #34495e; padding: 10px; border-radius: 6px; margin: 10px auto; max-width: 650px;
            display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; font-size: 14px; border: 1px solid #7f8c8d;
        }
        .player-card { padding: 4px 10px; border-radius: 4px; background: #2c3e50; font-size: 13px;}
        .player-card.active-turn { border: 2px solid #2ecc71; background: #16a085; }
        .tile-count { font-weight: bold; color: #f1c40f; }
        .meld-tag { font-size: 11px; padding: 1px 4px; border-radius: 3px; margin-left: 4px; font-weight: bold;}
        .meld-true { background: #3498db; color: white; }
        .meld-false { background: #e74c3c; color: white; }

        .board-container {
            background: #1a252f; border: 3px dashed #7f8c8d; min-height: 200px; margin: 10px 5px; padding: 15px;
            display: flex; flex-direction: column; gap: 15px; border-radius: 8px; box-sizing: border-box;
        }
        
        .tile-group {
            background: #2c3e50; border: 2px solid #bdc3c7; min-height: 75px; padding: 8px;
            display: flex; flex-wrap: wrap; gap: 6px; border-radius: 6px; position: relative;
        }
        .tile-group::before {
            content: "조합 세트"; position: absolute; top: -8px; left: 10px; background: #bdc3c7; color: #2c3e50;
            font-size: 10px; font-weight: bold; padding: 1px 5px; border-radius: 3px;
        }

        .hand-container { 
            background: #2c3e50; border: 3px solid #ccc; min-height: 100px; margin: 10px 5px; padding: 10px; 
            display: flex; flex-wrap: wrap; gap: 8px; border-radius: 8px; box-sizing: border-box;
        }
        
        .tile { 
            width: 40px; height: 52px; background: #f5f6fa; border-radius: 5px; display: flex; 
            justify-content: center; align-items: center; font-size: 18px; font-weight: bold; color: black; 
            cursor: grab; position: relative; touch-action: none; user-select: none;
            box-shadow: 2px 3px 4px rgba(0,0,0,0.4);
        }
        .red { color: #e74c3c; } .blue { color: #3498db; } .yellow { color: #f39c12; } .black { color: #2c3e50; }
        .joker { color: #8e44ad; background: #f1f2f6; border: 2px solid #8e44ad; } 
        
        .turn-indicator { font-size: 16px; color: #2ecc71; margin: 5px; font-weight: bold; }
        
        .waiting-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
        }
        .waiting-box { background: #1a252f; padding: 30px; border-radius: 10px; border: 2px solid #ccc; width: 80%; max-width: 400px;}
        .member-list { margin: 20px 0; text-align: left; background: #2c3e50; padding: 10px; border-radius: 5px;}
    </style>
</head>
<body>

    <div id="waitingScreen" class="waiting-overlay">
        <div class="waiting-box">
            <h2>⏳ <span id="waitRoomTitle"></span> 대기실</h2>
            <p>모둠원들이 접속할 때까지 기다려주세요.</p>
            <div class="member-list">
                <strong>현재 접속자 명단:</strong>
                <div id="memberListItems" style="margin-top: 5px; color: #3498db;"></div>
            </div>
            <!-- 버튼 표출 스크립트 오타 완전히 교정 완료 -->
            <button id="startBtn" class="green-btn" style="width: 100%; display: none;" onclick="startGame()">게임 시작하기</button>
            <p id="masterNotice" style="font-size:12px; color:#bdc3c7; margin-top:10px;">모둠장(첫 번째 입장객)만 시작할 수 있습니다.</p>
        </div>
    </div>

    <h1>🧩 실시간 학급 루미큐브 <span id="roomTitle" class="room-tag">대기 중</span></h1>
    
    <div id="playerBoard" class="player-status-board"></div>
    <div id="turnMessage" class="turn-indicator">참가 중...</div>
    
    <div class="controls">
        <button id="drawBtn" class="green-btn" onclick="socket.emit('drawTile')">타일 1장 뽑기</button>
        <button id="groupBtn" class="blue-btn" onclick="socket.emit('createNewGroup')">+ 새 조합 칸 만들기</button>
        <button onclick="sortHand('number')">숫자별 정렬</button>
        <button onclick="sortHand('color')">색상별 정렬</button>
        <button id="endTurnBtn" class="green-btn" onclick="socket.emit('endTurn')">턴 마치기</button>
    </div>

    <h3>공용 보드 구역</h3>
    <div id="boardContainer" class="board-container" ondragover="allowDrop(event)"></div>

    <h3>내 손패</h3>
    <div id="hand" class="hand-container" ondragover="allowDrop(event)" ondrop="dropToHand(event)"></div>

    <script>
        const socket = io(); 
        let myId = null;
        let localHand = []; 
        let currentSortType = null;
        let isMyTurn = false; 

        const userName = prompt("학급에서 사용할 이름을 입력하세요:", "학생" + Math.floor(Math.random()*100));
        let userRoom = prompt("참가할 모둠 번호를 입력하세요 (1~10):", "1");
        
        userRoom = parseInt(userRoom);
        if (isNaN(userRoom) || userRoom < 1) userRoom = 1;

        document.getElementById('roomTitle').innerText = `${userRoom}모둠`;
        document.getElementById('waitRoomTitle').innerText = `${userRoom}모둠`;

        socket.emit('joinGame', { name: userName, roomId: userRoom });

        socket.on('connect', () => { myId = socket.id; });

        socket.on('updateGame', (gameState) => {
            const me = gameState.players.find(p => p.id === myId);
            const currentTurnPlayer = gameState.players[gameState.currentTurn];
            
            if (gameState.status === 'waiting') {
                document.getElementById('waitingScreen').style.display = 'flex';
                const memberListItems = document.getElementById('memberListItems');
                memberListItems.innerHTML = gameState.players.map((p, idx) => `${idx+1}. ${p.name}`).join('<br>');
                
                if (gameState.players[0] && gameState.players[0].id === myId) {
                    document.getElementById('startBtn').style.display = 'block'; // 오타 교정
                    document.getElementById('masterNotice').style.display = 'none';
                }
                return;
            } else {
                document.getElementById('waitingScreen').style.display = 'none';
            }

            if (currentTurnPlayer) {
                if (currentTurnPlayer.id === myId) {
                    isMyTurn = true;
                    document.getElementById('turnMessage').innerText = "🔴 내 차례입니다! 타일을 조작하세요.";
                    toggleControls(false);
                } else {
                    isMyTurn = false;
                    document.getElementById('turnMessage').innerText = `• ${currentTurnPlayer.name}의 차례 대기 중...`;
                    toggleControls(true);
                }
            }

            // 등록 상태 레이블 칩 현황판에 반영
            const playerBoard = document.getElementById('playerBoard');
            playerBoard.innerHTML = '';
            gameState.players.forEach(p => {
                const pCard = document.createElement('div');
                pCard.className = `player-card ${currentTurnPlayer && currentTurnPlayer.id === p.id ? 'active-turn' : ''}`;
                
                const meldStatus = p.isMeldDone 
                    ? '<span class="meld-tag meld-true">등록 완료</span>' 
                    : '<span class="meld-tag meld-false">미등록</span>';

                pCard.innerHTML = `${p.id === myId ? '★나' : p.name}: <span class="tile-count">${p.hand.length}장</span> ${meldStatus}`;
                playerBoard.appendChild(pCard);
            });

            const boardContainer = document.getElementById('boardContainer');
            boardContainer.innerHTML = '';
            
            gameState.boardGroups.forEach((group, gIdx) => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'tile-group';
                groupDiv.dataset.groupIndex = gIdx;
                groupDiv.addEventListener('dragover', allowDrop);
                groupDiv.addEventListener('drop', (e) => dropToBoard(e, gIdx));
                
                group.forEach(tile => {
                    groupDiv.appendChild(createTileElement(tile));
                });
                boardContainer.appendChild(groupDiv);
            });

            if (me) {
                localHand = me.hand;
                applySort(); 
            }
        });

        function toggleControls(disable) {
            document.getElementById('drawBtn').disabled = disable;
            document.getElementById('groupBtn').disabled = disable;
            document.getElementById('endTurnBtn').disabled = disable;
        }

        function startGame() { socket.emit('gameStart'); }
        function sortHand(type) { currentSortType = type; applySort(); }

        function applySort() {
            if (currentSortType === 'number') {
                localHand.sort((a, b) => {
                    if (a.isJoker) return 1;
                    if (b.isJoker) return -1;
                    return a.number - b.number || a.color.localeCompare(b.color);
                });
            } else if (currentSortType === 'color') {
                localHand.sort((a, b) => {
                    if (a.isJoker) return 1;
                    if (b.isJoker) return -1;
                    return a.color.localeCompare(b.color) || a.number - b.number;
                });
            }
            
            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            localHand.forEach(tile => { handDiv.appendChild(createTileElement(tile)); });
        }

        function createTileElement(tile) {
            const el = document.createElement('div');
            el.className = `tile ${tile.isJoker ? 'joker' : tile.color}`;
            el.innerText = tile.number;
            el.id = tile.id;
            
            if (isMyTurn) {
                el.draggable = true;
                el.style.opacity = "1";
                el.style.cursor = "grab";
                el.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text', tile.id); });
                bindTouchEvents(el);
            } else {
                el.draggable = false;
                el.style.opacity = "0.7";
                el.style.cursor = "not-allowed";
            }
            return el;
        }

        function allowDrop(e) { if(isMyTurn) e.preventDefault(); }

        function dropToBoard(e, gIdx) {
            e.preventDefault();
            e.stopPropagation();
            if(!isMyTurn) return;
            const tileId = e.dataTransfer.getData('text');
            socket.emit('moveTile', { tileId, toZone: 'board', groupIndex: gIdx });
        }

        function dropToHand(e) {
            e.preventDefault();
            if(!isMyTurn) return;
            const tileId = e.dataTransfer.getData('text');
            socket.emit('moveTile', { tileId, toZone: 'hand' });
        }

        function bindTouchEvents(tileEl) {
            let startX, startY;

            tileEl.addEventListener('touchstart', function(e) {
                if(!isMyTurn) return;
                if (e.cancelable) e.preventDefault();
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                tileEl.style.zIndex = 1000;
            }, { passive: false });

            tileEl.addEventListener('touchmove', function(e) {
                if(!isMyTurn) return;
                if (e.cancelable) e.preventDefault();
                const touch = e.touches[0];
                tileEl.style.transform = `translate(${touch.clientX - startX}px, ${touch.clientY - startY}px)`;
            }, { passive: false });

            tileEl.addEventListener('touchend', function(e) {
                if(!isMyTurn) return;
                const touch = e.changedTouches[0];
                tileEl.style.zIndex = '';
                tileEl.style.transform = '';

                const x = touch.clientX;
                const y = touch.clientY;

                const handEl = document.getElementById('hand');
                const handRect = handEl.getBoundingClientRect();
                if (x >= handRect.left && x <= handRect.right && y >= handRect.top && y <= handRect.bottom) {
                    socket.emit('moveTile', { tileId: tileEl.id, toZone: 'hand' });
                    return;
                }

                const groups = document.querySelectorAll('.tile-group');
                for (let groupDiv of groups) {
                    const rect = groupDiv.getBoundingClientRect();
                    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                        const gIdx = groupDiv.dataset.groupIndex;
                        socket.emit('moveTile', { tileId: tileEl.id, toZone: 'board', groupIndex: gIdx });
                        break;
                    }
                }
            });
        }
        
        socket.on('errorMsg', (msg) => { alert(msg); });
    </script>
</body>
</html>
