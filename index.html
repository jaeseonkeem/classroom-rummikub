<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>실시간 교실 루미큐브 Pro (모바일 완벽 최적화)</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; background: #2c3e50; color: white; margin: 0; padding: 0;
            overflow: hidden; touch-action: manipulation;
            display: flex; flex-direction: column; 
            height: 100vh;
            height: 100dvh; /* 모바일 주소창 유동 높이 브라우저 오차 완벽 해결 */
        }
        
        /* 헤더 고정 영역 */
        .header-panel {
            background: #1a252f; padding: 10px; flex-shrink: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
        }
        h1 { font-size: 18px; margin: 0 0 5px 0; display: inline-block; vertical-align: middle; }
        .room-tag { background: #e74c3c; padding: 2px 8px; border-radius: 4px; font-size: 13px; margin-left: 5px; }
        
        /* 플레이어 현황판 */
        .player-status-board {
            background: #34495e; padding: 6px; border-radius: 6px; margin: 5px auto; max-width: 650px;
            display: flex; justify-content: space-around; flex-wrap: wrap; gap: 6px; font-size: 12px; border: 1px solid #7f8c8d;
        }
        .player-card { padding: 3px 8px; border-radius: 4px; background: #2c3e50; }
        .player-card.active-turn { border: 2px solid #2ecc71; background: #16a085; }
        .tile-count { font-weight: bold; color: #f1c40f; }
        .meld-tag { font-size: 10px; padding: 1px 3px; border-radius: 3px; margin-left: 3px; font-weight: bold;}
        .meld-true { background: #3498db; color: white; }
        .meld-false { background: #e74c3c; color: white; }

        .controls { margin: 5px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; }
        button {
            padding: 6px 12px; font-size: 13px; font-weight: bold; background: #e67e22; border: none; color: white; border-radius: 5px; cursor: pointer;
        }
        button:disabled { background: #7f8c8d !important; cursor: not-allowed; opacity: 0.6; }
        button.blue-btn { background: #3498db; }
        button.green-btn { background: #2ecc71; }
        
        /* 공용 보드가 브라우저 중간에서 스크롤 되도록 유동 높이 설정 */
        .board-container {
            background: #1a252f; border: 3px dashed #7f8c8d; margin: 5px; padding: 10px;
            flex: 1; /* 남는 모든 세로 공간을 정확하게 채움 */
            min-height: 0; /* Flexbox 내에서 내부 스크롤이 정상 작동하기 위한 트리거 */
            overflow-y: auto; display: flex; flex-direction: row; flex-wrap: wrap; 
            align-content: flex-start; gap: 10px; border-radius: 8px; box-sizing: border-box;
        }
        
        .tile-group {
            background: #2c3e50; border: 2px solid #bdc3c7; min-height: 65px; min-width: 140px; max-width: 220px; padding: 12px 6px 6px 6px;
            display: flex; flex-wrap: wrap; gap: 4px; border-radius: 6px; position: relative; flex-grow: 1; box-sizing: border-box;
            transition: box-shadow 0.2s;
        }
        .tile-group.highlight-dest {
            box-shadow: 0 0 10px #3498db; border-color: #3498db;
        }
        .tile-group::before {
            content: "조합 세트"; position: absolute; top: -8px; left: 8px; background: #bdc3c7; color: #2c3e50;
            font-size: 9px; font-weight: bold; padding: 1px 4px; border-radius: 3px;
        }

        /* 손패 구역을 화면 최하단에 절대 밀려나지 않도록 강력 고정 및 노치 대응 */
        .bottom-hand-panel {
            background: #1a252f; 
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px; /* iOS 홈바/인셋 하단 여백 대응 */
            border-top: 2px solid #bdc3c7; 
            flex-shrink: 0; /* 화면이 작아져도 절대로 이 영역은 찌그러지거나 숨지 않음 */
            z-index: 10;
        }
        .hand-container { 
            background: #2c3e50; border: 2px dashed #95a5a6; 
            min-height: 80px; 
            max-height: 140px; /* 모바일 가로모드나 태블릿에서 손패 구역이 과도하게 커지는 현상 방지 */
            overflow-y: auto; /* 손패가 너무 많을 경우 손패 구역 내부에서 자체 스크롤 */
            /* [최종 개선] 타일이 꽉 차도 터치 스크롤이 원활하도록 양 옆에 15px의 안전 터치 스크롤 전용 여백 확보 */
            padding: 8px 15px; 
            display: flex; flex-wrap: wrap; gap: 6px; border-radius: 8px; box-sizing: border-box;
            transition: box-shadow 0.2s;
            position: relative;
        }
        
        .hand-container.highlight-dest {
            box-shadow: 0 0 10px #2ecc71; border-color: #2ecc71;
        }
        
        /* 타일 칩 스타일 */
        .tile { 
            width: 34px; height: 46px; background: #f5f6fa; border-radius: 4px; display: flex; 
            justify-content: center; align-items: center; font-size: 15px; font-weight: bold; color: black; 
            cursor: grab; position: relative; touch-action: none; user-select: none;
            box-shadow: 2px 2px 3px rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .tile.selected {
            box-shadow: 0 0 12px #2ecc71;
            border: 2px solid #2ecc71;
            transform: scale(1.08);
        }
        .red { color: #e74c3c; } .blue { color: #3498db; } .yellow { color: #f39c12; } .black { color: #2c3e50; }
        .joker { color: #8e44ad; background: #f1f2f6; border: 2px solid #8e44ad; } 
        
        .turn-indicator { font-size: 14px; color: #2ecc71; margin: 2px; font-weight: bold; }
        
        /* 팝업 모달창 공통 레이아웃 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
        }
        .modal-box { background: #1a252f; padding: 25px; border-radius: 10px; border: 2px solid #ccc; width: 85%; max-width: 380px; box-sizing: border-box;}
        .member-list { margin: 15px 0; text-align: left; background: #2c3e50; padding: 8px; border-radius: 5px; font-size: 13px;}
        
        /* 인게임 인풋 폼 */
        .form-input {
            width: 100%; padding: 10px; font-size: 15px; margin: 8px 0; border-radius: 5px; border: 1px solid #7f8c8d;
            background: #2c3e50; color: white; box-sizing: border-box;
        }
        
        /* 커스텀 토스트 알림 메시지 */
        .toast-message {
            position: fixed; 
            top: 20px; 
            left: 50%; 
            /* 고정 픽셀 대신 자신의 높이(100%)와 상단 여백을 동적으로 계산하여 기종 불문 완전 은폐 */
            transform: translateX(-50%) translateY(calc(-100% - 50px));
            background: #e74c3c; 
            color: white; 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            z-index: 9999; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 살짝 튕기는 부드러운 애니메이션 효과 추가 */
            max-width: 90%; 
            text-align: center;
        }
        .toast-message.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast" class="toast-message">알림 메시지</div>

    <div id="reconnectModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3>⏳ 이전 플레이 감지됨</h3>
            <p id="reconnectDesc" style="font-size: 14px; color: #bdc3c7; line-height: 1.5;"></p>
            <button class="green-btn" style="width: 100%; margin-bottom: 8px;" onclick="chooseReconnect(true)">이어하기</button>
            <button style="width: 100%; background: #c0392b;" onclick="chooseReconnect(false)">새로 접속하기</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #2c3e50; padding-bottom: 8px;">
                <h2 style="font-size: 18px; margin: 0;">🧩 루미큐브 입장하기</h2>
                <a href="manual.html" target="_blank" style="font-size: 12px; color: #3498db; text-decoration: none; font-weight: bold; background: #2c3e50; padding: 4px 10px; border-radius: 4px; border: 1px solid #3498db; display: inline-flex; align-items: center; gap: 4px;">📖 가이드</a>
            </div>
            <label style="font-size: 13px; color: #bdc3c7;">이름 입력 (학급에서 쓰일 실명 권장)</label>
            <input type="text" id="inputName" class="form-input" placeholder="이름을 입력하세요">
            
            <label style="font-size: 13px; color: #bdc3c7;">모둠 번호 입력 (제한 없이 임의개설 가능)</label>
            <input type="number" id="inputRoom" class="form-input" placeholder="모둠 번호 (예: 1, 12, 104)">
            
            <button class="green-btn" style="width: 100%; margin-top: 10px;" onclick="submitLogin()">입장하기</button>
        </div>
    </div>

    <div id="waitingScreen" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h2>⏳ <span id="waitRoomTitle"></span> 대기실</h2>
            <p>모둠원들이 접속할 때까지 기다려주세요.</p>
            <div class="member-list">
                <strong>현재 접속자 명단:</strong>
                <div id="memberListItems" style="margin-top: 5px; color: #3498db;"></div>
            </div>
            <button id="startBtn" class="green-btn" style="width: 100%; display: none;" onclick="startGame()">게임 시작하기</button>
            <p id="masterNotice" style="font-size:12px; color:#bdc3c7; margin-top:10px;">모둠장만 시작할 수 있습니다.</p>
        </div>
    </div>

    <!-- 헤더 컨트롤 패널 -->
    <div class="header-panel">
        <h1>🧩 실시간 학급 루미큐브 <span id="roomTitle" class="room-tag">대기 중</span></h1>
        <div id="playerBoard" class="player-status-board"></div>
        <div id="turnMessage" class="turn-indicator">참가 중...</div>
        
        <div class="controls">
            <button id="drawBtn" class="green-btn" onclick="socket.emit('drawTile')">타일 1장 뽑기</button>
            <button id="groupBtn" class="blue-btn" onclick="socket.emit('createNewGroup')">+ 새 조합 칸 만들기</button>
            <button onclick="sortHand('number')">숫자별 정렬</button>
            <button onclick="sortHand('color')">색상별 정렬</button>
            <button id="endTurnBtn" class="green-btn" onclick="socket.emit('endTurn')">턴 마치기</button>
        </div>
    </div>

    <!-- 공용 보드 박스 구역 (중간 고정 내부스크롤) -->
    <div id="boardContainer" class="board-container" ondragover="allowDrop(event)"></div>

    <!-- 플레이어 손패 박스 구역 (맨바닥 고정) -->
    <div class="bottom-hand-panel">
        <h4 style="margin: 0 0 5px 0; text-align: left; font-size: 13px;">내 손패 영역 (여기로 놓으면 손패로 회수)</h4>
        <div id="hand" class="hand-container" ondragover="allowDrop(event)" ondrop="dropToHand(event)"></div>
    </div>

    <script>
        const socket = io(); 
        let myId = null;
        let localHand = []; 
        let currentSortType = null;
        let isMyTurn = false; 
        
        // 클릭-투-무브(Tap to Move) 제어 변수
        let selectedTileId = null; 

        // 로그인 모달 및 세션 복귀 로직
        window.onload = function() {
            const savedName = sessionStorage.getItem('rummi_name');
            const savedRoom = sessionStorage.getItem('rummi_room');

            if (savedName && savedRoom) {
                document.getElementById('reconnectDesc').innerText = `이전 플레이가 끊겼습니다.\n[${savedRoom}모둠 - ${savedName}]님으로 복귀할까요?`;
                document.getElementById('reconnectModal').style.display = 'flex';
            } else {
                document.getElementById('loginModal').style.display = 'flex';
            }
        };

        function chooseReconnect(agree) {
            document.getElementById('reconnectModal').style.display = 'none';
            if (agree) {
                const savedName = sessionStorage.getItem('rummi_name');
                const savedRoom = sessionStorage.getItem('rummi_room');
                connectToGame(savedName, savedRoom);
            } else {
                sessionStorage.clear();
                document.getElementById('loginModal').style.display = 'flex';
            }
        }

        function submitLogin() {
            const name = document.getElementById('inputName').value.trim();
            let room = parseInt(document.getElementById('inputRoom').value.trim());

            if (!name) {
                showToast("이름을 입력해 주셔야 합니다.");
                return;
            }
            if (isNaN(room) || room < 1) {
                room = 1;
            }

            sessionStorage.setItem('rummi_name', name);
            sessionStorage.setItem('rummi_room', room);
            document.getElementById('loginModal').style.display = 'none';
            connectToGame(name, room);
        }

        function connectToGame(name, room) {
            document.getElementById('roomTitle').innerText = `${room}모둠`;
            document.getElementById('waitRoomTitle').innerText = `${room}모둠`;
            socket.emit('joinGame', { name: name, roomId: room });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

        socket.on('updateGame', (gameState) => {
            const myName = sessionStorage.getItem('rummi_name');
            const me = gameState.players.find(p => p.name === myName);
            const currentTurnPlayer = gameState.players[gameState.currentTurn];
            
            if (gameState.status === 'waiting') {
                document.getElementById('waitingScreen').style.display = 'flex';
                const memberListItems = document.getElementById('memberListItems');
                memberListItems.innerHTML = gameState.players.map((p, idx) => `${idx+1}. ${p.name}`).join('<br>');
                
                if (gameState.players[0] && gameState.players[0].name === myName) {
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('masterNotice').style.display = 'none';
                }
                return;
            } else {
                document.getElementById('waitingScreen').style.display = 'none';
            }

            if (currentTurnPlayer) {
                if (currentTurnPlayer.name === myName) {
                    isMyTurn = true;
                    document.getElementById('turnMessage').innerText = "🔴 내 차례입니다! 타일을 조작하세요.";
                    toggleControls(false);

                    // [추적 룰 적용] 내 차례이고, 이미 타일을 단 한장이라도 냈다면 1장 뽑기 버튼만 강제 비활성화
                    if (me && me.turnSubmittedTiles && me.turnSubmittedTiles.length > 0) {
                        document.getElementById('drawBtn').disabled = true;
                    }
                } else {
                    isMyTurn = false;
                    document.getElementById('turnMessage').innerText = `• ${currentTurnPlayer.name}의 차례 대기 중...`;
                    toggleControls(true);
                }
            }

            const playerBoard = document.getElementById('playerBoard');
            playerBoard.innerHTML = '';
            gameState.players.forEach(p => {
                const pCard = document.createElement('div');
                pCard.className = `player-card ${currentTurnPlayer && currentTurnPlayer.name === p.name ? 'active-turn' : ''}`;
                const meldStatus = p.isMeldDone ? '<span class="meld-tag meld-true">등록 완료</span>' : '<span class="meld-tag meld-false">미등록</span>';
                pCard.innerHTML = `${p.name === myName ? '★나' : p.name}: <span class="tile-count">${p.hand.length}장</span> ${meldStatus}`;
                playerBoard.appendChild(pCard);
            });

            const boardContainer = document.getElementById('boardContainer');
            boardContainer.innerHTML = '';
            
            gameState.boardGroups.forEach((group, gIdx) => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'tile-group';
                groupDiv.dataset.groupIndex = gIdx;
                groupDiv.addEventListener('dragover', allowDrop);
                groupDiv.addEventListener('drop', (e) => dropToBoard(e, gIdx));
                
                // 클릭-투-무브 세트 선택 연동
                groupDiv.addEventListener('click', (e) => {
                    if (selectedTileId && isMyTurn) {
                        socket.emit('moveTile', { tileId: selectedTileId, toZone: 'board', groupIndex: gIdx });
                        clearSelection();
                    }
                });
                
                group.forEach(tile => { groupDiv.appendChild(createTileElement(tile)); });
                boardContainer.appendChild(groupDiv);
            });

            if (me) {
                localHand = me.hand;
                applySort(); 
            }
        });

        // 클릭-투-무브 손패 회수 연동
        document.getElementById('hand').addEventListener('click', (e) => {
            if (selectedTileId && isMyTurn) {
                socket.emit('moveTile', { tileId: selectedTileId, toZone: 'hand' });
                clearSelection();
            }
        });

        function handleTileSelection(tileId) {
            if (selectedTileId === tileId) {
                clearSelection();
            } else {
                clearSelection();
                selectedTileId = tileId;
                const el = document.getElementById(tileId);
                if (el) el.classList.add('selected');
                
                // 하이라이트 가이드라인 켜기
                document.getElementById('hand').classList.add('highlight-dest');
                document.querySelectorAll('.tile-group').forEach(el => el.classList.add('highlight-dest'));
            }
        }

        function clearSelection() {
            selectedTileId = null;
            document.querySelectorAll('.tile').forEach(el => el.classList.remove('selected'));
            document.getElementById('hand').classList.remove('highlight-dest');
            document.querySelectorAll('.tile-group').forEach(el => el.classList.remove('highlight-dest'));
        }

        function toggleControls(disable) {
            document.getElementById('drawBtn').disabled = disable;
            document.getElementById('groupBtn').disabled = disable;
            document.getElementById('endTurnBtn').disabled = disable;
        }

        function startGame() { socket.emit('gameStart'); }
        function sortHand(type) { currentSortType = type; applySort(); }

        function applySort() {
            if (currentSortType === 'number') {
                localHand.sort((a, b) => {
                    if (a.isJoker) return 1;
                    if (b.isJoker) return -1;
                    return a.number - b.number || a.color.localeCompare(b.color);
                });
            } else if (currentSortType === 'color') {
                localHand.sort((a, b) => {
                    if (a.isJoker) return 1;
                    if (b.isJoker) return -1;
                    return a.color.localeCompare(b.color) || a.number - b.number;
                });
            }
            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            localHand.forEach(tile => { handDiv.appendChild(createTileElement(tile)); });
        }

        function createTileElement(tile) {
            const el = document.createElement('div');
            el.className = `tile ${tile.isJoker ? 'joker' : tile.color}`;
            el.innerText = tile.isJoker ? '☺' : tile.number; // 조커일 때 이모티콘 ☺ 표시
            el.id = tile.id;
            
            if (isMyTurn) {
                el.draggable = true;
                el.style.opacity = "1";
                el.style.cursor = "grab";
                el.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text', tile.id); });
                bindTouchEvents(el);
                
                // 마우스 클릭 시 선택/해제 핸들러
                el.addEventListener('click', (e) => {
                    e.stopPropagation(); // 부모 컨테이너 드롭 이벤트 발동 방지
                    handleTileSelection(tile.id);
                });
            } else {
                el.draggable = false;
                el.style.opacity = "0.7";
                el.style.cursor = "not-allowed";
            }
            return el;
        }

        function allowDrop(e) { if(isMyTurn) e.preventDefault(); }

        function dropToBoard(e, gIdx) {
            e.preventDefault();
            e.stopPropagation();
            if(!isMyTurn) return;
            const tileId = e.dataTransfer.getData('text');
            socket.emit('moveTile', { tileId, toZone: 'board', groupIndex: gIdx });
        }

        function dropToHand(e) {
            e.preventDefault();
            if(!isMyTurn) return;
            const tileId = e.dataTransfer.getData('text');
            socket.emit('moveTile', { tileId, toZone: 'hand' });
        }

        // [최종 해결] 모바일 터치이동 및 탭 분기 제어 로직 (삼성 인터넷 완벽 대응)
        function bindTouchEvents(tileEl) {
            let startX, startY;
            let hasMoved = false;

            tileEl.addEventListener('touchstart', function(e) {
                if(!isMyTurn) return;
                // 단순 터치 시작 시에는 브라우저 스크롤을 막지 않아 탭 안정성을 확보
                const touch = e.touches[0];
                startX = touch.clientX; 
                startY = touch.clientY;
                hasMoved = false;
                tileEl.style.zIndex = 1000;
            }, { passive: true });

            tileEl.addEventListener('touchmove', function(e) {
                if(!isMyTurn) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;

                // 6px 이상의 움직임이 발생했을 때만 드래그로 판정하여 화면 이동 방지
                if (Math.hypot(dx, dy) > 6) {
                    hasMoved = true;
                    if (e.cancelable) e.preventDefault(); 
                }
                tileEl.style.transform = `translate(${dx}px, ${dy}px)`;
            }, { passive: false });

            tileEl.addEventListener('touchend', function(e) {
                if(!isMyTurn) return;
                const touch = e.changedTouches[0];
                tileEl.style.zIndex = ''; 
                tileEl.style.transform = '';

                // 움직임이 없었다면 (순수 탭인 경우) 탭 이동 기능 활성화
                if (!hasMoved) {
                    e.preventDefault(); // 하단의 가상 클릭 마우스이벤트 차단 (중복 실행 버그 완치)
                    handleTileSelection(tileEl.id);
                    return;
                }

                // 드래그앤드롭 좌표 매핑 로직
                const x = touch.clientX; 
                const y = touch.clientY;

                const handEl = document.getElementById('hand');
                const handRect = handEl.getBoundingClientRect();
                if (x >= handRect.left && x <= handRect.right && y >= handRect.top && y <= handRect.bottom) {
                    socket.emit('moveTile', { tileId: tileEl.id, toZone: 'hand' });
                    return;
                }

                const groups = document.querySelectorAll('.tile-group');
                for (let groupDiv of groups) {
                    const rect = groupDiv.getBoundingClientRect();
                    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                        const gIdx = groupDiv.dataset.groupIndex;
                        socket.emit('moveTile', { tileId: tileEl.id, toZone: 'board', groupIndex: gIdx });
                        break;
                    }
                }
            });
        }
        
        socket.on('errorMsg', (msg) => { showToast(msg); });
        socket.on('victory', (winner) => { 
            showToast(`🎉 축하합니다! [${winner}] 학생이 손패를 모두 털어 최종 승리했습니다!`); 
            sessionStorage.clear(); 
            setTimeout(() => { window.location.reload(); }, 4000);
        });
    </script>
</body>
</html>
