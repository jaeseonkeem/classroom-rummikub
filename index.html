<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>실시간 분반 루미큐브 Pro</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; background: #2c3e50; color: white; padding: 10px; text-align: center; margin: 0;
            overflow-x: hidden; touch-action: manipulation;
        }
        h1 { font-size: 20px; margin: 5px 0; }
        .room-tag { background: #e74c3c; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
        .controls { margin: 10px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; }
        button {
            padding: 8px 14px; font-size: 14px; font-weight: bold; background: #e67e22; border: none; color: white; border-radius: 5px; cursor: pointer;
        }
        button.blue-btn { background: #3498db; }
        button.green-btn { background: #2ecc71; }
        
        .board-container {
            background: #1a252f; border: 3px dashed #7f8c8d; min-height: 200px; margin: 10px 5px; padding: 15px;
            display: flex; flex-direction: column; gap: 15px; border-radius: 8px; box-sizing: border-box;
        }
        
        .tile-group {
            background: #2c3e50; border: 2px solid #bdc3c7; min-height: 75px; padding: 8px;
            display: flex; flex-wrap: wrap; gap: 6px; border-radius: 6px; position: relative;
        }
        .tile-group::before {
            content: "조합 세트"; position: absolute; top: -8px; left: 10px; background: #bdc3c7; color: #2c3e50;
            font-size: 10px; font-weight: bold; padding: 1px 5px; border-radius: 3px;
        }

        .hand-container { 
            background: #2c3e50; border: 3px solid #ccc; min-height: 100px; margin: 10px 5px; padding: 10px; 
            display: flex; flex-wrap: wrap; gap: 8px; border-radius: 8px; box-sizing: border-box;
        }
        
        .tile { 
            width: 40px; height: 52px; background: #f5f6fa; border-radius: 5px; display: flex; 
            justify-content: center; align-items: center; font-size: 18px; font-weight: bold; color: black; 
            cursor: grab; position: relative; touch-action: none; user-select: none;
            box-shadow: 2px 3px 4px rgba(0,0,0,0.4);
        }
        .red { color: #e74c3c; } .blue { color: #3498db; } .yellow { color: #f39c12; } .black { color: #2c3e50; }
        .joker { color: #8e44ad; background: #f1f2f6; border: 2px solid #8e44ad; } 
        
        .turn-indicator { font-size: 15px; color: #2ecc71; margin: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 상단 타벨에 모둠 이름 동적 배치 -->
    <h1>🧩 실시간 학급 루미큐브 <span id="roomTitle" class="room-tag">대기 중</span></h1>
    <div id="turnMessage" class="turn-indicator">참가 중...</div>
    
    <div class="controls">
        <button class="green-btn" onclick="socket.emit('drawTile')">타일 1장 뽑기</button>
        <button class="blue-btn" onclick="socket.emit('createNewGroup')">+ 새 조합 칸 만들기</button>
        <button onclick="sortHand('number')">숫자별 정렬</button>
        <button onclick="sortHand('color')">색상별 정렬</button>
        <button class="green-btn" onclick="socket.emit('endTurn')">턴 마치기</button>
    </div>

    <h3>공용 보드 구역</h3>
    <div id="boardContainer" class="board-container" ondragover="allowDrop(event)"></div>

    <h3>내 손패</h3>
    <div id="hand" class="hand-container" ondragover="allowDrop(event)" ondrop="dropToHand(event)"></div>

    <script>
        const socket = io(); 
        let myId = null;
        let localHand = []; 
        let currentSortType = null;

        // [멀티룸 입력 확장] 이름과 모둠 번호를 연속으로 받습니다.
        const userName = prompt("학급에서 사용할 이름을 입력하세요:", "학생" + Math.floor(Math.random()*100));
        let userRoom = prompt("참가할 모둠 번호를 입력하세요 (1~10):", "1");
        
        // 예외 입력 제어 (문자 입력 시 1번방 고정)
        userRoom = parseInt(userRoom);
        if (isNaN(userRoom) || userRoom < 1) userRoom = 1;

        // 화면에 현재 모둠 번호 표기
        document.getElementById('roomTitle').innerText = `${userRoom}모둠`;

        // 서버에 이름과 방 번호를 객체로 묶어 전송
        socket.emit('joinGame', { name: userName, roomId: userRoom });

        socket.on('connect', () => { myId = socket.id; });

        socket.on('updateGame', (gameState) => {
            const me = gameState.players.find(p => p.id === myId);
            const currentTurnPlayer = gameState.players[gameState.currentTurn];
            
            if (currentTurnPlayer) {
                document.getElementById('turnMessage').innerText = 
                    currentTurnPlayer.id === myId ? "🔴 내 차례입니다! 타일을 조작하세요." : `• ${currentTurnPlayer.name}의 차례 대기 중...`;
            }

            const boardContainer = document.getElementById('boardContainer');
            boardContainer.innerHTML = '';
            
            gameState.boardGroups.forEach((group, gIdx) => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'tile-group';
                groupDiv.dataset.groupIndex = gIdx;
                groupDiv.addEventListener('dragover', allowDrop);
                groupDiv.addEventListener('drop', (e) => dropToBoard(e, gIdx));
                
                group.forEach(tile => {
                    groupDiv.appendChild(createTileElement(tile));
                });
                boardContainer.appendChild(groupDiv);
            });

            if (me) {
                localHand = me.hand;
                applySort(); 
            }
        });

        function sortHand(type) {
            currentSortType = type;
            applySort();
        }

        function applySort() {
            if (currentSortType === 'number') {
                localHand.sort((a, b) => {
                    if (a.isJoker) return 1;
                    if (b.isJoker) return -1;
                    return a.number - b.number || a.color.localeCompare(b.color);
                });
            } else if (currentSortType === 'color') {
                localHand.sort((a, b) => {
                    if (a.isJoker) return 1;
                    if (b.isJoker) return -1;
                    return a.color.localeCompare(b.color) || a.number - b.number);
                });
            }
            
            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            localHand.forEach(tile => {
                handDiv.appendChild(createTileElement(tile));
            });
        }

        function createTileElement(tile) {
            const el = document.createElement('div');
            el.className = `tile ${tile.isJoker ? 'joker' : tile.color}`;
            el.innerText = tile.number;
            el.id = tile.id;
            el.draggable = true;
            
            el.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text', tile.id); });
            bindTouchEvents(el);
            return el;
        }

        function allowDrop(e) { e.preventDefault(); }

        function dropToBoard(e, gIdx) {
            e.preventDefault();
            e.stopPropagation();
            const tileId = e.dataTransfer.getData('text');
            socket.emit('moveTile', { tileId, toZone: 'board', groupIndex: gIdx });
        }

        function dropToHand(e) {
            e.preventDefault();
            const tileId = e.dataTransfer.getData('text');
            socket.emit('moveTile', { tileId, toZone: 'hand' });
        }

        function bindTouchEvents(tileEl) {
            let startX, startY;

            tileEl.addEventListener('touchstart', function(e) {
                if (e.cancelable) e.preventDefault();
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                tileEl.style.zIndex = 1000;
            }, { passive: false });

            tileEl.addEventListener('touchmove', function(e) {
                if (e.cancelable) e.preventDefault();
                const touch = e.touches[0];
                tileEl.style.transform = `translate(${touch.clientX - startX}px, ${touch.clientY - startY}px)`;
            }, { passive: false });

            tileEl.addEventListener('touchend', function(e) {
                const touch = e.changedTouches[0];
                tileEl.style.zIndex = '';
                tileEl.style.transform = '';

                const x = touch.clientX;
                const y = touch.clientY;

                const handEl = document.getElementById('hand');
                const handRect = handEl.getBoundingClientRect();
                if (x >= handRect.left && x <= handRect.right && y >= handRect.top && y <= handRect.bottom) {
                    socket.emit('moveTile', { tileId: tileEl.id, toZone: 'hand' });
                    return;
                }

                const groups = document.querySelectorAll('.tile-group');
                for (let groupDiv of groups) {
                    const rect = groupDiv.getBoundingClientRect();
                    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                        const gIdx = groupDiv.dataset.groupIndex;
                        socket.emit('moveTile', { tileId: tileEl.id, toZone: 'board', groupIndex: gIdx });
                        break;
                    }
                }
            });
        }
    </script>
</body>
</html>
