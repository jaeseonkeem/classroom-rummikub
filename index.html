<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>실시간 교실 루미큐브 (모바일 지원)</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #2c3e50; 
            color: white; 
            padding: 10px; 
            text-align: center; 
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation; /* 모바일 더블탭 줌 방지 */
        }
        h1 { font-size: 20px; margin: 10px 0; }
        .grid-container, .hand-container { 
            background: #1a252f; 
            border: 2px solid #ccc; 
            min-height: 120px; 
            margin: 10px 5px; 
            padding: 10px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            border-radius: 8px;
            box-sizing: border-box;
        }
        .tile { 
            width: 42px; 
            height: 55px; 
            background: white; 
            border-radius: 5px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 18px; 
            font-weight: bold; 
            color: black; 
            cursor: grab;
            position: relative;
            touch-action: none; /* 모바일에서 브라우저 스크롤 막고 터치 이동 허용 */
            user-select: none;
            box-shadow: 1px 2px 3px rgba(0,0,0,0.3);
        }
        .red { color: #e74c3c; } 
        .blue { color: #3498db; } 
        .yellow { color: #f1c40f; } 
        .black { color: #2c3e50; }
        .turn-indicator { font-size: 16px; color: #2ecc71; margin: 10px; font-weight: bold; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #e67e22;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🎮 실시간 교실 루미큐브</h1>
    <div id="turnMessage" class="turn-indicator">게임 참여 대기 중...</div>
    <button onclick="endTurn()">턴 마치기</button>

    <h3>공용 보드 구역</h3>
    <div id="board" class="grid-container" ondragover="allowDrop(event)" ondrop="drop(event)"></div>

    <h3>내 손패</h3>
    <div id="hand" class="hand-container"></div>

    <script>
        const socket = io(); 
        let myId = null;

        // 접속 시 이름 입력
        const userName = prompt("학급에서 사용할 이름을 입력하세요:", "학생" + Math.floor(Math.random()*100));
        socket.emit('joinGame', userName);

        socket.on('connect', () => { myId = socket.id; });

        socket.on('updateGame', (gameState) => {
            const me = gameState.players.find(p => p.id === myId);
            const currentTurnPlayer = gameState.players[gameState.currentTurn];
            
            if (currentTurnPlayer) {
                if (currentTurnPlayer.id === myId) {
                    document.getElementById('turnMessage').innerText = "🔴 내 차례입니다! 타일을 놓으세요.";
                } else {
                    document.getElementById('turnMessage').innerText = `• ${currentTurnPlayer.name}의 차례를 기다리는 중...`;
                }
            }

            // 보드 그리기
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            gameState.boardTiles.forEach(tile => {
                boardDiv.appendChild(createTileElement(tile, false));
            });

            // 내 패 그리기
            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            if (me) {
                me.hand.forEach(tile => {
                    handDiv.appendChild(createTileElement(tile, true));
                });
            }
        });

        function createTileElement(tile, isDraggable) {
            const el = document.createElement('div');
            el.className = `tile ${tile.color}`;
            el.innerText = tile.number;
            el.id = tile.id;
            
            if (isDraggable) {
                el.draggable = true;
                
                // PC 마우스 드래그 이벤트
                el.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text', tile.id); });

                // 스마트폰 모바일 터치 이벤트 바인딩
                bindTouchEvents(el);
            }
            return el;
        }

        // 모바일 터치 이동 핵심 로직
        function bindTouchEvents(tileEl) {
            let startX, startY;

            tileEl.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                tileEl.style.zIndex = 1000; // 맨 위로 띄우기
            }, { passive: true });

            tileEl.addEventListener('touchmove', function(e) {
                const touch = e.touches[0];
                // 손가락 따라 실시간 위치 이동 가시화
                tileEl.style.transform = `translate(${touch.clientX - startX}px, ${touch.clientY - startY}px)`;
            }, { passive: true });

            tileEl.addEventListener('touchend', function(e) {
                const touch = e.changedTouches[0];
                tileEl.style.zIndex = '';
                tileEl.style.transform = '';

                // 터치가 끝난 지점에 공용 보드가 있는지 판별
                const boardEl = document.getElementById('board');
                const boardRect = boardEl.getBoundingClientRect();

                // 손가락 뗀 위치가 공용 보드 박스 안쪽이라면
                if (touch.clientX >= boardRect.left && touch.clientX <= boardRect.right &&
                    touch.clientY >= boardRect.top && touch.clientY <= boardRect.bottom) {
                    
                    // 서버로 타일 이동 요청 전송
                    socket.emit('moveTileToBoard', { tileId: tileEl.id });
                }
            });
        }

        function allowDrop(e) { e.preventDefault(); }

        // PC 마우스 드롭
        function drop(e) {
            e.preventDefault();
            const tileId = e.dataTransfer.getData('text');
            socket.emit('moveTileToBoard', { tileId });
        }

        function endTurn() { socket.emit('endTurn'); }
        socket.on('errorMsg', (msg) => { alert(msg); });
    </script>
</body>
</html>
